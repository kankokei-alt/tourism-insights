<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>47都道府県 観光戦略分析 | 長野県観光インサイト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="japan_map_data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F2F0EB;
    --surface: #FFFFFF;
    --text-primary: #1A1A18;
    --text-secondary: #6B6B64;
    --text-muted: #A8A89E;
    --accent: #1D6A4A;
    --accent-light: #E8F3EE;
    --accent-mid: #2E8B5F;
    --border: rgba(26,26,24,0.1);
    --border-strong: rgba(26,26,24,0.2);
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(242,240,235,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px; display: flex; align-items: center; gap: 12px; height: 56px;
  }
  .nav-back { font-size: 13px; color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .nav-back:hover { color: var(--accent); }
  .nav-divider { width: 1px; height: 16px; background: var(--border-strong); }
  .nav-title { font-size: 13px; font-weight: 500; }
  .nav-badge { margin-left: auto; font-size: 10px; font-family: 'DM Mono', monospace; padding: 3px 10px; border-radius: 20px; background: var(--accent-light); color: var(--accent); }

  .layout { display: grid; grid-template-columns: 1fr 420px; min-height: calc(100vh - 56px); }

  .map-panel { padding: 24px 32px; display: flex; flex-direction: column; }
  .panel-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .panel-hint::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #map-container { flex: 1; position: relative; }
  #japan-svg { width: 100%; height: 100%; min-height: 500px; }
  #japan-svg path {
    stroke: #F2F0EB; stroke-width: 0.5;
    cursor: pointer; transition: fill 0.15s;
  }
  #japan-svg path.default { fill: #C8C5BC; }
  #japan-svg path.nagano { fill: #A8CCBA; }
  #japan-svg path.hovered { fill: #7DB89A; }
  #japan-svg path.selected { fill: var(--accent) !important; }

  .tooltip {
    position: fixed; pointer-events: none;
    background: var(--text-primary); color: white;
    font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
    padding: 6px 12px; border-radius: 6px;
    opacity: 0; transition: opacity 0.12s;
    z-index: 999; white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }

  .legend { display: flex; gap: 20px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-secondary); }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  .result-panel { border-left: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow-y: auto; }

  .result-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; gap: 16px; }
  .empty-icon { font-size: 48px; opacity: 0.25; }
  .empty-text { font-size: 14px; color: var(--text-muted); line-height: 1.9; }

  .loading-block { display: none; padding: 40px 32px; flex-direction: column; align-items: center; gap: 16px; }
  .loading-block.visible { display: flex; }
  .spinner { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent-light); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-secondary); text-align: center; line-height: 1.8; }

  .result-content { padding: 28px 28px 40px; display: none; flex-direction: column; }
  .result-content.visible { display: flex; }

  .result-header { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .result-pref-name { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .result-pref-sub { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; letter-spacing: 0.05em; }

  .section { margin-bottom: 24px; }
  .section-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--accent-light); }

  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .score-card { background: var(--bg); border-radius: 8px; padding: 11px 13px; }
  .score-card-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .score-bar-bg { height: 5px; background: #E0DDD6; border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
  .score-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s ease; width: 0; }
  .score-val { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--accent); font-weight: 500; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: var(--accent-light); color: var(--accent); font-family: 'DM Mono', monospace; }
  .tag.orange { background: #FEF3E8; color: #B45309; }
  .tag.blue { background: #EFF6FF; color: #1D4ED8; }

  .compare-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .compare-row:last-child { border-bottom: none; }
  .compare-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .compare-text { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }
  .compare-text strong { color: var(--text-primary); font-weight: 500; }

  .analysis-text { font-size: 13px; line-height: 1.85; color: var(--text-secondary); }

  .error-block { padding: 20px; background: #FEF2F2; border-radius: 8px; font-size: 13px; color: #991B1B; line-height: 1.7; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .result-panel { border-left: none; border-top: 1px solid var(--border); }
    nav { padding: 0 20px; }
    .map-panel { padding: 20px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="index.html">← 一覧へ戻る</a>
  <div class="nav-divider"></div>
  <span class="nav-title">47都道府県 観光戦略分析</span>
  <span class="nav-badge">AI分析</span>
</nav>

<div class="layout">
  <div class="map-panel">
    <div class="panel-hint">都道府県をクリックして観光戦略をAI分析</div>
    <div id="map-container">
      <svg id="japan-svg"></svg>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#A8CCBA;"></div>長野県</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1D6A4A;"></div>選択中</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C8C5BC;"></div>未選択</div>
    </div>
  </div>

  <div class="result-panel" id="result-panel">
    <div class="result-empty" id="empty-state">
      <div class="empty-icon">🗾</div>
      <div class="empty-text">地図から都道府県を<br>クリックしてください<br><br>AIがその県の観光戦略を<br>長野県との比較で分析します</div>
    </div>
    <div class="loading-block" id="loading-block">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">分析中...</div>
    </div>
    <div class="result-content" id="result-content"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const NAGANO_ID = 20;
let selectedPath = null;

const container = document.getElementById('map-container');
const svg = d3.select('#japan-svg');
const tooltip = document.getElementById('tooltip');

function initMap() {
  const width = container.clientWidth || 600;
  const height = Math.max(container.clientHeight, 520);

  svg.attr('viewBox', `0 0 ${width} ${height}`);

  const projection = d3.geoMercator()
    .fitSize([width, height], JAPAN_GEOJSON);

  const path = d3.geoPath().projection(projection);

  svg.selectAll('path')
    .data(JAPAN_GEOJSON.features)
    .enter()
    .append('path')
    .attr('d', path)
    .attr('class', d => d.properties.id === NAGANO_ID ? 'nagano' : 'default')
    .attr('data-id', d => d.properties.id)
    .attr('data-name', d => d.properties.nam_ja)
    .on('mousemove', function(event, d) {
      const name = d.properties.nam_ja;
      tooltip.textContent = name;
      tooltip.classList.add('visible');
      tooltip.style.left = (event.clientX + 14) + 'px';
      tooltip.style.top = (event.clientY - 32) + 'px';

      if (this !== selectedPath) {
        d3.select(this).classed('hovered', true);
      }
    })
    .on('mouseleave', function() {
      tooltip.classList.remove('visible');
      if (this !== selectedPath) {
        d3.select(this).classed('hovered', false);
      }
    })
    .on('click', function(event, d) {
      if (selectedPath) {
        const prevId = d3.select(selectedPath).attr('data-id');
        d3.select(selectedPath)
          .classed('selected', false)
          .classed('hovered', false)
          .attr('class', parseInt(prevId) === NAGANO_ID ? 'nagano' : 'default');
      }
      d3.select(this).classed('selected', true).classed('hovered', false);
      selectedPath = this;
      analyzePrefecture(d.properties.id, d.properties.nam_ja, d.properties.nam);
    });
}

initMap();
window.addEventListener('resize', () => {
  svg.selectAll('path').remove();
  initMap();
});

async function analyzePrefecture(id, nameJa, nameEn) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('result-content').classList.remove('visible');
  document.getElementById('result-content').style.display = 'none';
  document.getElementById('loading-block').classList.add('visible');
  document.getElementById('loading-text').innerHTML = `<strong>${nameJa}</strong>の観光戦略を分析中...<br>少々お待ちください`;

  const isNagano = id === NAGANO_ID;
  const prompt = isNagano
    ? `あなたは日本の観光政策の専門家です。長野県の観光戦略について自己分析してください。全国平均との比較、強み・弱み・改善点を教えてください。

必ずJSON形式のみで回答。前置きや説明文は不要：
{"scores":{"inbound":数値0-100,"digital":数値0-100,"sustainability":数値0-100,"uniqueness":数値0-100},"keyPolicies":["施策1","施策2","施策3","施策4","施策5"],"inboundStrategy":"インバウンド戦略の現状分析（120字以内）","comparisonWithNagano":[{"icon":"💪","text":"強み（具体的に）"},{"icon":"⚠️","text":"課題（具体的に）"},{"icon":"🎯","text":"重点改善ポイント"}],"learnings":"今後の長野県が取り組むべき具体的な戦略（120字以内）"}`
    : `あなたは日本の観光政策の専門家です。${nameJa}（${nameEn}）の観光戦略について分析し、長野県DMOの担当者向けに比較インサイトを提供してください。

必ずJSON形式のみで回答。前置きや説明文は不要：
{"scores":{"inbound":数値0-100,"digital":数値0-100,"sustainability":数値0-100,"uniqueness":数値0-100},"keyPolicies":["施策1","施策2","施策3","施策4","施策5"],"inboundStrategy":"${nameJa}のインバウンド戦略の特徴（120字以内）","comparisonWithNagano":[{"icon":"✅","text":"長野より優れている点"},{"icon":"⚡","text":"長野と競合・重複している点"},{"icon":"💡","text":"長野が参考にできる独自施策"}],"learnings":"長野県が${nameJa}から学べる具体的な施策（120字以内）"}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    let text = data.content[0].text.trim();
    text = text.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    const result = JSON.parse(text);
    renderResult(nameJa, nameEn, result, isNagano);
  } catch (err) {
    document.getElementById('loading-block').classList.remove('visible');
    const rc = document.getElementById('result-content');
    rc.innerHTML = `<div class="error-block">分析中にエラーが発生しました。もう一度クリックしてお試しください。<br><small style="opacity:0.6">${err.message}</small></div>`;
    rc.style.display = 'flex';
    rc.classList.add('visible');
  }
}

function renderResult(nameJa, nameEn, data, isNagano) {
  document.getElementById('loading-block').classList.remove('visible');

  const scoreLabels = { inbound: 'インバウンド', digital: 'デジタル化', sustainability: '持続可能性', uniqueness: '独自性' };
  const sectionTitle = isNagano ? '長野県 自己分析' : '長野県との比較';
  const learnTitle = isNagano ? '今後の重点戦略' : '長野が参考にできる点';

  const html = `
    <div class="result-header">
      <div class="result-pref-name">${nameJa}</div>
      <div class="result-pref-sub">${nameEn.replace(' Ken','').replace(' Fu','').replace(' To','').replace(' Do','')} · AI Analysis for Nagano DMO</div>
    </div>
    <div class="section">
      <div class="section-label">観光戦略スコア</div>
      <div class="score-grid">
        ${Object.entries(data.scores).map(([key, val]) => `
          <div class="score-card">
            <div class="score-card-label">${scoreLabels[key]}</div>
            <div class="score-bar-bg"><div class="score-bar-fill" id="bar-${key}" style="width:0%"></div></div>
            <div class="score-val">${val} / 100</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="section">
      <div class="section-label">重点施策</div>
      <div class="tag-list">
        ${data.keyPolicies.map((p, i) => `<span class="tag ${i%3===1?'orange':i%3===2?'blue':''}">${p}</span>`).join('')}
      </div>
    </div>
    <div class="section">
      <div class="section-label">インバウンド戦略</div>
      <div class="analysis-text">${data.inboundStrategy}</div>
    </div>
    <div class="section">
      <div class="section-label">${sectionTitle}</div>
      ${data.comparisonWithNagano.map(c => `
        <div class="compare-row">
          <div class="compare-icon">${c.icon}</div>
          <div class="compare-text">${c.text}</div>
        </div>
      `).join('')}
    </div>
    <div class="section">
      <div class="section-label">${learnTitle}</div>
      <div class="analysis-text">${data.learnings}</div>
    </div>
  `;

  const rc = document.getElementById('result-content');
  rc.innerHTML = html;
  rc.style.display = 'flex';
  rc.classList.add('visible');

  // Animate bars after render
  requestAnimationFrame(() => {
    Object.entries(data.scores).forEach(([key, val]) => {
      const bar = document.getElementById(`bar-${key}`);
      if (bar) setTimeout(() => { bar.style.width = val + '%'; }, 100);
    });
  });
}
</script>
</body>
</html>
